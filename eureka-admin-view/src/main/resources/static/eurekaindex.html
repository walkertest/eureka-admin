	<!--		 style="display: flex; margin-right: 10px" -->

<!--		am-topbar-right-->

<script src="./res/amazeui/js/amazeui.min.js"></script>
<script src="./res/layer/layer.js"></script>
<script src="./res/laytpl/laytpl.js"></script>
<script src="./res/amazeui/js/app.js"></script>
<script src="./res/eureka/common.js"></script>
<!-- jquery-form放common.js后面，因为common.js有对ajax函数的重写，放jquery-form之前才会让ajaxSubmit生效 -->
<script src="./res/jquery-form/jquery-form-v3.51.0.js"></script>
<script>
	(function(){


		var menus = [{
			name: 'Dashboard',
			icon: 'fa-tachometer',
			url: 'views/home.html'
		},{
			name: 'ServiceAdmin',
			icon: 'fa-tachometer',
			url: 'views/services.html'
		}];

		//加载sidebar菜单
		function renderMenu(menus, ele){
			var li = '<li><a href="javascript:void(0);" data-url="{{url}}"><span class="{{icon}}"></span>{{name}}</a></li>';
			var liParent = '<li class="admin-parent"><a class="am-cf" data-am-collapse="{target: \'#collapse-nav{{name}}\'}">'
					+ '<span class="{{icon}}"></span> {{name}}'
					+ '<span class="am-icon-angle-right am-fr am-margin-right"></span>'
					+ '</a>'
					+ '<ul class="am-list am-collapse admin-sidebar-sub" id="collapse-nav{{name}}">'
					+ '</ul></li>';
			for(var i=0; i<menus.length; i++){
				var menu = menus[i];
				var hasChildren = menu.list && menu.list.length > 0;
				if(hasChildren){
					(ele || $('#sidebarList')).append($.format(liParent, menu));
					renderMenu(menu.list, $('#sidebarList li:last .admin-sidebar-sub'));
				} else{
					(ele || $('#sidebarList')).append($.format(li, menu));
				}
			}
		}

		// 显示当前集群
		const clusterNames = {
			zhixu: '秩序',
			passport: '账号',
			zhifu: '支付'
		};
		const cluster = getCookie('eureka_cluster');
		if (cluster && clusterNames[cluster]) {
			document.getElementById('currentCluster').textContent = clusterNames[cluster];
		}

		function selectCluster(cluster) {
			const name = clusterNames[cluster]
			//选择环境之后，更新cookie保存的集群信息，后续默认使用这个环境
			console.log("选择环境：" + cluster);
			//帮我把cluster更新进cookie字段中，cookie key为 eureka_cluster
			setCookie("eureka_cluster", cluster, 1);

			document.getElementById('currentCluster').textContent = name;
			// 关闭下拉菜单
			// $('.am-dropdown').removeClass('am-active');
			$('.am-dropdown').dropdown('close');

			// 判断当前页面是否为 home.html
			if (window.location.hash.includes('home.html')) {
				$.ajax({
					url: 'views/home.html',
					dataType: 'html',
					cache: false,
					success: function(data){
						$('#contentBody').html(data);
					}
				});
			} else {
				location.reload();
			}

			// 刷新当前页面
			// location.reload();

			//调用刷新接口
			// 判断当前页面是否为 services.html
			// if ($('#contentBody').find('[data-page="services"]').length > 0) {
			// 	if (typeof query === 'function') {
			// 		query();
			// 	}
			// }

		}
		window.selectCluster = selectCluster;

		function  setCookie(name, value) {
			const Days = 30;
			const exp = new Date();
			exp.setTime(exp.getTime() + Days * 24 * 60 * 60 * 1000);
			var expires = "; expires=" + exp.toUTCString();
			document.cookie = name + "=" + encodeURIComponent(value) + expires + "; path=/";
		}

		// 读取 cookie 工具函数
		function getCookie(name) {
			const arr = document.cookie.match(new RegExp('(^| )' + name + '=([^;]*)(;|$)'));
			return arr ? decodeURIComponent(arr[2]) : null;
		}

		//绑定菜单点击事件
		$('#sidebarList').on('click', 'a[data-url]', function(){
			var url = $(this).data('url');
			$('#sidebarList').find('li').each(function(){
				$(this).removeClass('am-active');
			});
			$(this).parent().addClass("am-active");
			$.ajax({
				url: url,
				dataType: 'html',
				cache: false,
				success: function(data){
					$('#contentBody').html(data);
				}
			});
			$('#breadcrumbs').text($(this).text());

			// 设置 hash
			window.location.hash = url;
		});

		//页面加载逻辑，加载sidebarList以及功能页
		$(function(){
			$('#sidebarList').css('height', $(window).height() - 36);
			$(window).resize(function() {
				$('#sidebarList').css('height', $(window).height() - 36);
			});
			$('#sidebarList').empty();
			renderMenu(menus);
			//默认加载service-admin页面，如果location hash中有地址匹配的话，加载对应的页面
			if(window.location.hash && window.location.hash.length > 1){
				var hash = window.location.hash.substring(1);
				var matched = false;
				$('#sidebarList a[data-url]').each(function(){
					if($(this).data('url').includes(hash)){
						$(this).trigger('click');
						matched = true;
						return false;
					}
				});
				if(matched){
					return ;
				}
			}
			$('#sidebarList a[data-url]').filter(function() {
				return $(this).text().trim() === 'ServiceAdmin';
			}).first().trigger('click');
		});
	})();
</script>
</body>
</html>

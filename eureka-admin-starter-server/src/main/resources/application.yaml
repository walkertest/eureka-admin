server:
  port: 11111

spring:
  project:
    name: huyapassport
  application:
    name: eureka-admin--starter-server

logging:
  level:
    com:
      itopener: DEBUG
    org:
      springframework: INFO

eureka:
  client:
    refresh:
      interval: 1

eureka.envs:
  - name: dev
    chineseName: 开发
    url: https://eurekaadmin.test.huya.info
  - name: test
    chineseName: 测试
    url: https://eurekaadmin.test.huya.info
  - name: prod
    chineseName: 生产
    url: https://eurekaadmin.huya.info
